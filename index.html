<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예배 큐시트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #fff8f0 0%, #fff5eb 50%, #fef7ed 100%);
      background-attachment: fixed;
      min-height: 100vh; color: #1e293b;
    }
    .sermon-row { background: linear-gradient(90deg, #fef9c3, #fde68a) !important; }
    @media print {
      .no-print { display: none !important; }
      body { padding: 0; margin: 0; background: #fff; }
    }

    /* Animations */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

    /* Header — 밝고 화사 */
    header {
      background: rgba(255,255,255,.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 2px solid transparent;
      border-image: linear-gradient(90deg, #f59e0b, #d4a017, #f59e0b) 1;
      box-shadow: 0 2px 16px rgba(0,0,0,.04);
    }
    header h1 { color: #1e293b; font-weight: 700; }
    header h1 span { background: linear-gradient(135deg, #f59e0b, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* Cards */
    .card-section {
      background: rgba(255,255,255,.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.03);
      border: 1px solid rgba(255,255,255,.8); overflow: hidden;
      animation: fadeUp .5s ease forwards;
    }
    .card-section::before {
      content: ''; display: block; height: 3px;
      background: linear-gradient(90deg, #f59e0b, #d4a017, #f59e0b);
    }

    /* Section titles */
    .section-title { color: #334155; font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
    .section-title::before { content: ''; width: 4px; height: 20px; border-radius: 4px; background: linear-gradient(180deg, #f59e0b, #d97706); }

    /* 테이블 */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-wrap table { min-width: 900px; table-layout: fixed; }
    .table-wrap table th { white-space: nowrap; }
    .table-wrap table td { white-space: normal; vertical-align: top; height: auto; }
    .table-wrap table tr { height: auto; transition: background .15s; }
    .table-wrap table input { min-width: 60px; }
    .table-wrap::-webkit-scrollbar { height: 5px; }
    .table-wrap::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 5px; }
    .table-wrap::-webkit-scrollbar-thumb { background: linear-gradient(90deg, #f59e0b, #d97706); border-radius: 5px; }
    table input, table textarea {
      background: transparent; border: none; width: 100%; color: #1e293b;
      padding: 6px 8px; font-size: 0.875rem;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all .2s; min-height: 36px;
    }
    table textarea { resize: none; overflow-y: hidden; min-height: 44px; display: block; line-height: 1.5; word-break: break-all; }
    table input:focus, table textarea:focus {
      outline: none; background: #fef3c7;
      box-shadow: inset 0 0 0 2px #fb923c;
      border-radius: 6px;
    }
    table input::placeholder, table textarea::placeholder { color: #94a3b8; }

    /* Table header */
    .table-header { background: linear-gradient(135deg, #78716c, #57534e) !important; }

    /* Buttons */
    .btn-gold {
      background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; border: none;
      box-shadow: 0 4px 16px rgba(245,158,11,.3); transition: all .25s; font-weight: 600;
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,158,11,.4); }
    .btn-gold:active { transform: scale(.96); }

    /* Team inputs */
    .team-input {
      transition: all .25s; border: 1px solid #e2e8f0 !important;
      border-radius: 10px !important; color: #1e293b;
    }
    .team-input:focus {
      border-color: #f59e0b !important;
      box-shadow: 0 0 0 3px rgba(245,158,11,.15), 0 2px 8px rgba(245,158,11,.1) !important;
    }
    .team-input::placeholder { color: #94a3b8; }

    .saved-item:hover { background-color: #fef3c7; }
    .delete-row-btn { opacity: 0; transition: opacity .2s; }
    tr:hover .delete-row-btn { opacity: 1; }

    /* Add row button */
    .btn-add {
      background: #f0fdf4; color: #16a34a; border: 1px dashed #86efac;
      transition: all .2s; animation: float 3s ease-in-out infinite;
    }
    .btn-add:hover { background: #dcfce7; border-color: #4ade80; transform: scale(1.02); }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f59e0b',
            'primary-dark': '#d97706',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Editor Tab -->

        </div>

          <label class="block text-sm font-medium text-gray-600 mb-1">예배 시작 시간</label>

            <option value="10:30">오전 10시 30분</option>
            <option value="11:00" selected>오전 11시</option>
            <option value="11:30">오전 11시 30분</option>
            <option value="12:00">오후 12시</option>
            <option value="13:00">오후 1시</option>
            <option value="14:00">오후 2시</option>
            <option value="15:00">오후 3시</option>
            <option value="16:00">오후 4시</option>
            <option value="17:00">오후 5시</option>
            <option value="19:00">오후 7시</option>

        </div>

    <!-- 담당자 배정 (테이블 위) -->
    <div class="card-section p-5 mb-5">
      <h2 class="section-title mb-4">담당자 배정</h2>
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3" id="team-section">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">설교자</label>

        </div>

          <input type="search" data-team="leader" name="no-auto-leader-8132" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')" class="team-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-amber-300 focus:border-amber-300" placeholder="이름">

          <input type="search" data-team="offering" name="no-auto-offering-8392" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')" class="team-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-amber-300 focus:border-amber-300" placeholder="이름">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">안내</label>
          <input type="search" data-team="usher" name="no-auto-usher-9236" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')" class="team-input w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-amber-300 focus:border-amber-300" placeholder="이름">

        <div>

  <!-- Preview Tab -->

      <h2 class="text-lg font-semibold text-gray-700 mb-4">저장된 큐시트</h2>

  <!-- Toast -->

<script>
// 순서별 기본 소요 시간 (분)
const ORDER_TEMPLATE = [
  { order: '찬양', duration: 25, content: '', person: '', camera: '', ppt: '찬양 가사', isSermon: false },
  { order: '기도', duration: 5, content: '', person: '', camera: '', ppt: '', isSermon: false },
  { order: '말씀봉독', duration: 5, content: '', person: '', camera: '', ppt: '성경본문', isSermon: false },
  { order: '설교', duration: 60, content: '', person: '', camera: '', ppt: '설교 PPT', isSermon: true },
  { order: '기도', duration: 5, content: '', person: '', camera: '', ppt: '', isSermon: false },
  { order: '봉헌', duration: 5, content: '', person: '', camera: '', ppt: '봉헌 안내', isSermon: false },
  { order: '광고', duration: 5, content: '', person: '', camera: '', ppt: '광고 PPT', isSermon: false },
];

function buildDefaultRows(startTime) {
  const parts = startTime.split(':');
  let h = parseInt(parts[0]), m = parseInt(parts[1] || 0);
  const result = [];
  for (const tmpl of ORDER_TEMPLATE) {
    const startH = h, startM = m;
    m += tmpl.duration;
    while (m >= 60) { h++; m -= 60; }
    const endH = h, endM = m;
    const fmt = (hh,mm) => String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
    result.push({
      time: fmt(startH, startM) + '~' + fmt(endH, endM),
      order: tmpl.order,
      duration: tmpl.duration,
      content: tmpl.content,
      person: tmpl.person,
      camera: tmpl.camera,
      ppt: tmpl.ppt,
      isSermon: tmpl.isSermon,
    });
  }
  return result;
}

const DEFAULT_ROWS = buildDefaultRows('11:00');

function recalcTimes() {
  const startTime = document.getElementById('meta-time').value;
  const newRows = buildDefaultRows(startTime);
  // 기존 담당자/내용 유지하면서 시간만 업데이트
  for (let i = 0; i < rows.length && i < newRows.length; i++) {
    rows[i].time = newRows[i].time;
  }
  // 행 수가 다르면 새로 생성
  if (rows.length === 0) {
    rows = newRows;
  }
  renderTable();
}

let rows = [];

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  setDefaultDate();
  resetToTemplate();
  // 브라우저 자동완성 강제 클리어
  setTimeout(() => {
    document.querySelectorAll('.team-input').forEach(el => { el.value = ''; });
  }, 100);
});

function setDefaultDate() {
  const today = new Date();
  document.getElementById('meta-date').value = formatDateValue(today);
  updateDayLabel();
}

function updateDayLabel() {
  const dateVal = document.getElementById('meta-date').value;
  if (!dateVal) return;
  const d = new Date(dateVal + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  let label = document.getElementById('day-label');
  if (!label) {
    label = document.createElement('span');
    label.id = 'day-label';
    label.style.cssText = 'margin-left:8px;font-size:0.875rem;color:#f59e0b;font-weight:600;';
    document.getElementById('meta-date').parentElement.appendChild(label);
  }
  label.textContent = '(' + days[d.getDay()] + '요일)';
}

function formatDateValue(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDateDisplay(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const year = d.getFullYear();
  const month = d.getMonth() + 1;
  const day = d.getDate();
  const weekdays = ['일','월','화','수','목','금','토'];
  const weekday = weekdays[d.getDay()];
  return `${year}. ${month}.${day} ${weekday}요일`;
}

function resetToTemplate() {
  const startTime = document.getElementById('meta-time').value;
  rows = buildDefaultRows(startTime);
  renderTable();
  document.querySelectorAll('.team-input').forEach(el => el.value = '');
}

// 담당자 입력 → 표에 자동 반영
const TEAM_ROLE_MAP = {
  leader: '인도자',
  prayer: '대표기도',
  worship: '찬양팀',
  offering: '봉헌',
  preacher: '설교자',
  usher: '안내',
  media: '영상팀',
};

// 각 행의 원래 역할을 기억 (이름이 바뀌어도 역할 매핑 유지)
function getOriginalRoles() {
  return ORDER_TEMPLATE.map(r => r.person);
}

document.addEventListener('input', function(e) {
  if (!e.target.classList.contains('team-input')) return;
  const team = e.target.dataset.team;
  const name = e.target.value.trim();
  if (!team) return;

  rows.forEach((row) => {
    const order = (row.order || '').toLowerCase();

    if (team === 'preacher' && (order.includes('설교') || order.includes('축도'))) {
      row.person = name;
    }
    if (team === 'leader' && (order.includes('말씀봉독') || order.includes('봉독'))) {
      row.person = name;
    }
    if (team === 'prayer' && order.includes('기도') && !order.includes('설교')) {
      // 기도 순서 중 첫번째와 마지막(설교 후 기도)에 기도자 배정
      row.person = name;
    }
    if (team === 'worship' && order.includes('찬양')) {
      row.person = name;
    }
    if (team === 'offering' && order.includes('봉헌')) {
      row.person = name;
    }
    if (team === 'usher' && order.includes('안내')) {
      row.person = name;
    }
    if (team === 'media' && order.includes('광고')) {
      row.person = name;
    }
  });
  // 테이블 전체 재생성 대신 담당자 셀만 업데이트 (스크롤/포커스 유지)
  const tbody = document.getElementById('cuesheet-body');
  const trs = tbody.querySelectorAll('tr');
  rows.forEach((row, i) => {
    if (trs[i]) {
      const personInput = trs[i].querySelectorAll('input')[2]; // 3번째 input = 담당자 (내용은 textarea)
      if (personInput && personInput !== document.activeElement) {
        personInput.value = row.person || '';
      }
    }
  });
});

function renderTable() {
  const tbody = document.getElementById('cuesheet-body');
  tbody.innerHTML = '';
  rows.forEach((row, idx) => {
    const tr = document.createElement('tr');
    tr.className = `border-b border-gray-100 hover:bg-gray-50 ${row.isSermon ? 'sermon-row' : (idx % 2 === 0 ? 'bg-white' : 'bg-gray-50/50')}`;
    tr.innerHTML = `
      <td class="px-1 py-1"><input type="text" value="${esc(row.time)}" onchange="rows[${idx}].time=this.value" class="text-gray-600"></td>
      <td class="px-1 py-1"><input type="text" value="${esc(row.order)}" onchange="updateOrder(${idx}, this.value)" class="font-medium text-gray-800"></td>
      <td class="px-1 py-1"><textarea rows="2" oninput="rows[${idx}].content=this.value;this.style.height='auto';this.style.height=this.scrollHeight+'px'" class="text-gray-600">${esc(row.content)}</textarea></td>
      <td class="px-1 py-1"><input type="text" value="${esc(row.person)}" onchange="rows[${idx}].person=this.value" class="text-gray-600"></td>
      <td class="px-1 py-1"><input type="text" value="${esc(row.camera)}" onchange="rows[${idx}].camera=this.value" class="text-gray-600"></td>
      <td class="px-1 py-1"><input type="text" value="${esc(row.ppt)}" onchange="rows[${idx}].ppt=this.value" class="text-gray-600"></td>
      <td class="px-1 py-1 text-center no-print">
        <button onclick="removeRow(${idx})" class="delete-row-btn text-red-400 hover:text-red-600 text-lg leading-none" title="삭제">&times;</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  // 모든 textarea 높이 자동 조정
  setTimeout(function() {
    document.querySelectorAll('#cuesheet-body textarea').forEach(function(ta) {
      ta.style.height = 'auto';
      ta.style.height = Math.max(44, ta.scrollHeight) + 'px';
    });
  }, 10);
}

function updateOrder(idx, val) {
  rows[idx].order = val;
  rows[idx].isSermon = val.includes('설교');
  renderTable();
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addRow() {
  rows.push({ time: '', order: '', content: '', person: '', camera: '', ppt: '', isSermon: false });
  renderTable();
  const tbody = document.getElementById('cuesheet-body');
  const lastInput = tbody.lastElementChild.querySelector('input');
  if (lastInput) lastInput.focus();
}

function removeRow(idx) {
  if (rows.length <= 1) return;
  rows.splice(idx, 1);
  renderTable();
}

function getTeamData() {
  const data = {};
  document.querySelectorAll('.team-input').forEach(el => {
    data[el.dataset.team] = el.value;
  });
  return data;
}

function setTeamData(data) {
  if (!data) return;
  document.querySelectorAll('.team-input').forEach(el => {
    if (data[el.dataset.team] !== undefined) el.value = data[el.dataset.team];
  });
}

function collectCurrentData() {
  // Sync from inputs (내용은 textarea, 나머지는 input)
  const tbody = document.getElementById('cuesheet-body');
  const trs = tbody.querySelectorAll('tr');
  trs.forEach((tr, idx) => {
    const inputs = tr.querySelectorAll('input');
    const textarea = tr.querySelector('textarea');
    if (rows[idx]) {
      rows[idx].time = inputs[0] ? inputs[0].value : '';
      rows[idx].order = inputs[1] ? inputs[1].value : '';
      rows[idx].content = textarea ? textarea.value : '';
      rows[idx].person = inputs[2] ? inputs[2].value : '';
      rows[idx].camera = inputs[3] ? inputs[3].value : '';
      rows[idx].ppt = inputs[4] ? inputs[4].value : '';
      rows[idx].isSermon = (inputs[1] ? inputs[1].value : '').includes('설교');
    }
  });
}

// Tab switching
function showTab(tab) {
  ['editor','preview','saved'].forEach(t => {
    document.getElementById('view-' + t).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById('tab-' + t);
    btn.className = btn.className.replace(/tab-active|tab-inactive/g, '').trim();
    btn.classList.add(t === tab ? 'tab-active' : 'tab-inactive');
  });
  if (tab === 'preview') renderPreview();
  if (tab === 'saved') renderSavedList();
}

// Preview
function renderPreview() {
  collectCurrentData();
  const date = document.getElementById('meta-date').value;
  const service = document.getElementById('meta-service').value;
  const time = document.getElementById('meta-time').value;
  const team = getTeamData();

  const dateDisplay = formatDateDisplay(date);
  const title = `${dateDisplay} ${service} (${time}) 예배 진행안`;

  let html = `
    <div style="text-align:center; margin-bottom: 24px;">
      <h2 style="font-size:1.25rem; font-weight:700; color:#1f2937; margin-bottom:4px;">${title}</h2>
    </div>
    <table style="width:100%; border-collapse:collapse; font-size:0.85rem; margin-bottom:20px;">
      <thead>
        <tr style="background:#1f2937; color:white;">
          <th style="padding:8px 10px; text-align:left; border:1px solid #374151; width:90px;">시간</th>
          <th style="padding:8px 10px; text-align:left; border:1px solid #374151; width:110px;">순서</th>
          <th style="padding:8px 10px; text-align:left; border:1px solid #374151;">내용</th>
          <th style="padding:8px 10px; text-align:left; border:1px solid #374151; width:80px;">담당자</th>
          <th style="padding:8px 10px; text-align:left; border:1px solid #374151; width:80px;">카메라</th>
          <th style="padding:8px 10px; text-align:left; border:1px solid #374151; width:90px;">PPT/비고</th>
        </tr>
      </thead>
      <tbody>
  `;

  rows.forEach((row, idx) => {
    const bg = row.isSermon ? '#fef9c3' : (idx % 2 === 0 ? '#ffffff' : '#f9fafb');
    const fw = row.isSermon ? 'font-weight:600;' : '';
    html += `
      <tr style="background:${bg};">
        <td style="padding:6px 10px; border:1px solid #e5e7eb; color:#6b7280; ${fw}">${esc(row.time)}</td>
        <td style="padding:6px 10px; border:1px solid #e5e7eb; font-weight:500; ${fw}">${esc(row.order)}</td>
        <td style="padding:6px 10px; border:1px solid #e5e7eb; color:#4b5563; ${fw}">${esc(row.content)}</td>
        <td style="padding:6px 10px; border:1px solid #e5e7eb; color:#6b7280; ${fw}">${esc(row.person)}</td>
        <td style="padding:6px 10px; border:1px solid #e5e7eb; color:#6b7280; ${fw}">${esc(row.camera)}</td>
        <td style="padding:6px 10px; border:1px solid #e5e7eb; color:#6b7280; ${fw}">${esc(row.ppt)}</td>
      </tr>
    `;
  });

  html += `</tbody></table>`;

  // Team section
  const teamLabels = {
    preacher: '설교자', leader: '인도자', prayer: '대표기도자',
    worship: '찬양팀', offering: '봉헌', usher: '안내', media: '영상팀'
  };
  const teamEntries = Object.entries(team).filter(([,v]) => v);
  if (teamEntries.length > 0) {
    html += `<div style="margin-top:16px; padding:12px 16px; background:#f9fafb; border-radius:8px; border:1px solid #e5e7eb;">`;
    html += `<div style="font-weight:600; font-size:0.85rem; color:#374151; margin-bottom:8px;">담당자</div>`;
    html += `<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:4px 16px; font-size:0.8rem;">`;
    teamEntries.forEach(([key, val]) => {
      html += `<div><span style="color:#6b7280;">${teamLabels[key] || key}:</span> <span style="color:#1f2937; font-weight:500;">${esc(val)}</span></div>`;
    });
    html += `</div></div>`;
  }

  document.getElementById('preview-content').innerHTML = html;
}

// Save
function saveCueSheet() {
  collectCurrentData();
  const date = document.getElementById('meta-date').value;
  const service = document.getElementById('meta-service').value;
  const key = `cuesheet_${date}_${service}`;
  const data = {
    date, service,
    time: document.getElementById('meta-time').value,
    rows: JSON.parse(JSON.stringify(rows)),
    team: getTeamData(),
    savedAt: new Date().toISOString()
  };
  localStorage.setItem(key, JSON.stringify(data));

  // Update index
  let index = JSON.parse(localStorage.getItem('cuesheet_index') || '[]');
  if (!index.includes(key)) index.push(key);
  localStorage.setItem('cuesheet_index', JSON.stringify(index));

  showToast('저장되었습니다');
}

function loadCueSheet(key) {
  const raw = localStorage.getItem(key);
  if (!raw) return;
  const data = JSON.parse(raw);
  document.getElementById('meta-date').value = data.date;
  document.getElementById('meta-service').value = data.service;
  document.getElementById('meta-time').value = data.time;
  rows = data.rows;
  setTeamData(data.team);
  renderTable();
  showTab('editor');
  showToast('불러왔습니다');
}

function deleteCueSheet(key) {
  if (!confirm('이 큐시트를 삭제하시겠습니까?')) return;
  localStorage.removeItem(key);
  let index = JSON.parse(localStorage.getItem('cuesheet_index') || '[]');
  index = index.filter(k => k !== key);
  localStorage.setItem('cuesheet_index', JSON.stringify(index));
  renderSavedList();
  showToast('삭제되었습니다');
}

function renderSavedList() {
  const container = document.getElementById('saved-list');
  const index = JSON.parse(localStorage.getItem('cuesheet_index') || '[]');
  if (index.length === 0) {
    container.innerHTML = '<p class="text-gray-400 text-sm py-8 text-center">저장된 큐시트가 없습니다.</p>';
    return;
  }
  let html = '';
  index.sort().reverse().forEach(key => {
    const raw = localStorage.getItem(key);
    if (!raw) return;
    const data = JSON.parse(raw);
    const dateDisplay = formatDateDisplay(data.date);
    html += `
      <div class="flex items-center justify-between py-3 px-4 border-b border-gray-100 saved-item rounded-lg cursor-pointer transition" onclick="loadCueSheet('${key}')">
        <div>
          <div class="font-medium text-gray-800 text-sm">${dateDisplay} ${data.service}</div>
          <div class="text-xs text-gray-400 mt-0.5">저장: ${new Date(data.savedAt).toLocaleString('ko-KR')}</div>
        </div>
        <button onclick="event.stopPropagation(); deleteCueSheet('${key}')" class="text-red-400 hover:text-red-600 text-sm px-2 py-1 rounded hover:bg-red-50 transition">삭제</button>
      </div>
    `;
  });
  container.innerHTML = html;
}

// PDF
// 테이블을 이미지로 캡처 — 임시 div로 깨끗하게 렌더
async function captureTableImage() {
  renderPreview();
  // 임시 div를 body에 추가 (화면 밖, 고정 폭)
  const tmp = document.createElement('div');
  tmp.style.cssText = 'position:fixed;left:-9999px;top:0;width:900px;background:#fff;padding:24px;font-family:Noto Sans KR,sans-serif;';
  tmp.innerHTML = document.getElementById('preview-content').innerHTML;
  document.body.appendChild(tmp);

  const canvas = await html2canvas(tmp, { scale: 2, useCORS: true, width: 900, backgroundColor: '#ffffff' });
  document.body.removeChild(tmp);
  return canvas;
}

// 미리보기 (아래에 이미지 표시)
async function previewImage() {
  showToast('미리보기 생성 중...');
  const canvas = await captureTableImage();
  const dataUrl = canvas.toDataURL('image/png');
  const container = document.getElementById('saved-images');
  container.innerHTML = '<div class="bg-white rounded-xl shadow-sm p-4 mb-4 border border-gray-100">' +
    '<div class="flex items-center justify-between mb-3">' +
    '<span class="text-sm font-semibold text-gray-700">미리보기</span>' +
    '<button onclick="this.parentElement.parentElement.remove()" class="text-gray-400 hover:text-gray-600 text-sm">닫기</button>' +
    '</div>' +
    '<img src="' + dataUrl + '" class="w-full rounded-lg border border-gray-200" alt="큐시트 미리보기">' +
    '</div>';
  showToast('미리보기 완료!');
}

// 공유하기 (카톡 등)
async function shareImage() {
  showToast('이미지 생성 중...');
  const canvas = await captureTableImage();
  canvas.toBlob(async function(blob) {
    const date = document.getElementById('meta-date').value;
    const service = document.getElementById('meta-service').value || '예배';
    const fileName = '큐시트_' + date + '_' + service + '.png';
    const file = new File([blob], fileName, { type: 'image/png' });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: '예배 큐시트', text: date + ' ' + service + ' 큐시트' });
      } catch (e) {
        // 공유 취소 등
        downloadBlob(blob, fileName);
      }
    } else {
      // 공유 API 미지원 시 다운로드
      downloadBlob(blob, fileName);
      showToast('이미지가 다운로드되었습니다');
    }
  }, 'image/png');
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// 저장하기 (아래에 이미지 표시)
async function saveImage() {
  showToast('이미지 저장 중...');
  const canvas = await captureTableImage();
  const dataUrl = canvas.toDataURL('image/png');
  const date = document.getElementById('meta-date').value;
  const service = document.getElementById('meta-service').value || '예배';

  const container = document.getElementById('saved-images');
  const card = document.createElement('div');
  card.className = 'bg-white rounded-xl shadow-sm p-4 mb-4 border border-gray-100';
  card.innerHTML = '<div class="flex items-center justify-between mb-3">' +
    '<span class="text-sm font-semibold text-gray-700">' + date + ' ' + service + '</span>' +
    '<button onclick="this.parentElement.parentElement.remove()" class="text-red-400 hover:text-red-600 text-sm">삭제</button>' +
    '</div>' +
    '<img src="' + dataUrl + '" class="w-full rounded-lg border border-gray-200" alt="큐시트">';
  container.prepend(card);
  showToast('저장 완료!');
}

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('translate-y-20', 'opacity-0');
  t.classList.add('translate-y-0', 'opacity-100');
  setTimeout(() => {
    t.classList.add('translate-y-20', 'opacity-0');
    t.classList.remove('translate-y-0', 'opacity-100');
  }, 2000);
}
</script>
